# Hydra config for main_opt.py (controller-baseline test, no RL training).
# Override on the CLI as `python main_opt.py method=cbfqp test_ep=50`.
# Composes env+human+controller+reward (env/env.yaml) and a robot preset
# so Config(cfg) has every section the controllers expect.

defaults:
  - _self_
  - /env: env
  - /env/robot: single_integrator

method: cbfqp        # nominal | cbfqp

# Test-mode rollout
test_ep: 100
episode_seeds: ""
episode_seed_start: 100
render: false
config_json: ""
use_current_config: false

# Output
model_folder: default

# System
device: cpu
seed: 0

hydra:
  job:
    chdir: false
