# @package _global_
# Hydra entry for main_vec.py PPO training.
# Composes PPO algo hyperparams, env+human+controller+reward, and robot preset.

defaults:
  - _self_
  - ppo
  - /env: env
  - /env/robot: unicycle # single_integrator | unicycle 

# RL method: vanilla_ppo | diffcvarbfqp
method: vanilla_ppo
actor_model: ""
critic_model: ""

# Training totals
total_timesteps: 20000000

# Checkpointing
save_after_timesteps: 1000000
save_freq: 1000000
model_folder: default
save_dir: trained_models/${model_folder}
overwrite: false

# Run naming and W&B logging follow the diff_opt training entrypoint style.
run_name: null
wandb_entity: xinywa_umich
wandb_project: diff_cvar
wandb_interval: 10

# System
device: auto         # auto | cpu | cuda
seed: 0
num_envs: 8

# Optional experiment logging. Disabled by default so training runs without a
# Weights & Biases login in fresh open-source checkouts.
wandb:
  enabled: true
  project: ${wandb_project}
  entity: ${wandb_entity}

hydra:
  job:
    chdir: false
