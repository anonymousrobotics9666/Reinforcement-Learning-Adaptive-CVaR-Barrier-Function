# @package _global_
# Hydra entry for scripts/run_ppo_base.py PPO training.
# Composes PPO algo hyperparams, env+human+controller+reward, and robot preset.

defaults:
  - _self_
  - ppo
  - /env: env
  - /env/robot: unicycle # single_integrator | unicycle 

# RL method: vanilla_ppo | diffcvarbfqp
method: vanilla_ppo
actor_model: ""

# Training totals
total_timesteps: 20000000

# Checkpointing
model_folder: default
save_dir: trained_models/${model_folder}
overwrite: false

# Run naming and W&B logging follow the diff_opt training entrypoint style.
run_name: null
wandb_entity: xinywa_umich
wandb_project: diff_cvar
wandb_interval: 10

# System
device: auto         # auto | cpu | cuda
seed: 0
num_envs: 8

hydra:
  job:
    chdir: false
