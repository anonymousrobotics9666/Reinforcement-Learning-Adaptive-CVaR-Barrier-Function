# @package _global_
# Unicycle robot preset + the reward overrides that paired with it
# in config.py's robot-type branch (`if robot.type == 'unicycle'`).

robot:
  type: unicycle
  radius: 0.3
  vmax: 1.5
  amax: 2.0
  omega_max: 1.5707963267948966   # np.pi / 2
  ini_goal_dist: 6.0

reward:
  potential_factor: 3.0
  back_factor: 0.1
  spin_factor: 4.5
