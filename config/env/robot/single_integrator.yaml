# @package _global_
# Single-integrator robot preset + the reward overrides that paired with it
# in config.py's robot-type branch (`if robot.type == 'single_integrator'`).

robot:
  type: single_integrator
  radius: 0.3
  vmax: 1.5
  amax: 2.0
  omega_max: 1.5707963267948966   # np.pi / 2
  ini_goal_dist: 8.0

reward:
  potential_factor: 2.0
  back_factor: 0.0
  spin_factor: 0.0
